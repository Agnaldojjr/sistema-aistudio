version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Mounts the current directory to /app in the container for live-reloading code changes
      - .:/app
      # Prevents local node_modules from overriding the container's node_modules
      - /app/node_modules
    env_file:
      - .env.test
    environment:
      - NODE_ENV=development
